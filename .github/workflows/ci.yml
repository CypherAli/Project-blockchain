name: CI

on:
  push:
    branches: [master, main, dev, develop]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Smart Contract Tests ────────────────────────────────────────────────────
  contracts:
    name: Contracts (compile + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blockchain/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Check gas report (informational)
        run: npx hardhat test --reporter gas
        continue-on-error: true
        env:
          REPORT_GAS: 'true'

  # ─── Indexer Type Check ──────────────────────────────────────────────────────
  indexer:
    name: Indexer (TypeScript check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indexer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: indexer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

  # ─── Frontend Build ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true # warn only — TS errors in .d.ts from wagmi are expected

      - name: Build
        run: npm run build
        env:
          # Minimal env for build — factory address can be placeholder
          NEXT_PUBLIC_FACTORY_ADDRESS: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_CHAIN_ID: '11155111'
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID || 'placeholder' }}
          NEXT_PUBLIC_INDEXER_URL: 'http://localhost:3001'
          # IPFS optional — skip in CI
          NEXT_PUBLIC_PINATA_JWT: ''

  # ─── All-pass gate ───────────────────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [contracts, indexer, frontend]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.contracts.result }}" != "success" ]]; then
            echo "❌ Contracts job failed"
            exit 1
          fi
          if [[ "${{ needs.indexer.result }}" != "success" ]]; then
            echo "❌ Indexer job failed"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" != "success" ]]; then
            echo "❌ Frontend job failed"
            exit 1
          fi
          echo "✅ All CI jobs passed"
